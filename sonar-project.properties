# SonarQube / SonarCloud Configuration
# https://sonarcloud.io/documentation/analysis/analysis-parameters/

# Project Identification
sonar.projectKey=ShoppingProject
sonar.organization=your-org
sonar.projectName=Shopping Project
sonar.projectVersion=1.0

# Source Directories
sonar.sources=src/Domain,src/Application,src/Infrastructure,src/Presentation
sonar.tests=src/Tests

# Exclusions
sonar.exclusions=\
  **/obj/**,\
  **/bin/**,\
  **/Migrations/**,\
  **/*.Designer.cs,\
  **/*.g.cs,\
  **/node_modules/**,\
  **/docs/**,\
  **/coverage/**

# Test File Inclusions
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs

# Coverage Settings
sonar.cs.opencover.reportsPaths=**/coverage.cobertura.xml
sonar.cs.vstest.reportsPaths=**/TestResults/*.trx
sonar.coverage.exclusions=\
  **/Tests/**,\
  **/Migrations/**,\
  **/Program.cs,\
  **/GlobalUsings.cs,\
  **/DependencyInjection.cs

# Code Quality Settings
sonar.qualitygate.wait=false
sonar.qualitygate.timeout=300

# Technical Debt Settings
sonar.technicalDebt.developerCost=30
sonar.technicalDebt.ratingA=0.05
sonar.technicalDebt.ratingB=0.1
sonar.technicalDebt.ratingC=0.2
sonar.technicalDebt.ratingD=0.5

# Duplications
sonar.cpd.exclusions=\
  **/Tests/**,\
  **/*Configuration.cs
sonar.cpd.minimumLines=10
sonar.cpd.minimumTokens=100

# Security Analysis
sonar.security.hotspots.level=HIGH
sonar.security.hotspots.includeGeneratedCode=false

# Issue Ignore Settings
sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignore "Method has too many parameters" for constructors
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S107
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.cs

# Ignore "Refactor this method to reduce its Cognitive Complexity" for tests
sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Tests/**/*.cs

# Ignore "Use the overload that has a 'StringComparison' parameter" for EF queries
sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S1449
sonar.issue.ignore.multicriteria.e3.resourceKey=**/Repositories/**/*.cs

# Language Settings
sonar.language=cs
sonar.sourceEncoding=UTF-8

# SCM Settings
sonar.scm.provider=git
sonar.scm.exclusions.disabled=false

# Analysis Logging
sonar.verbose=false
sonar.log.level=INFO

# Pull Request Decoration
sonar.pullrequest.provider=GitHub
sonar.pullrequest.github.repository=your-org/ShoppingProject

# Branch Analysis
sonar.branch.name=${env.GITHUB_REF_NAME}

# Links
sonar.links.homepage=https://github.com/your-org/ShoppingProject
sonar.links.ci=https://github.com/your-org/ShoppingProject/actions
sonar.links.scm=https://github.com/your-org/ShoppingProject
sonar.links.issue=https://github.com/your-org/ShoppingProject/issues

# Issue Ignore Settings
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# Ignore "Unused local variable" in tests
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S1481
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Tests/**/*.cs

# Ignore "Use index instead of First/Last" in tests
sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S6608
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Tests/**/*.cs

# Ignore "TODO comments" in all files
sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.cs

# Ignore "Rethrow exception with context" in UnitOfWork
sonar.issue.ignore.multicriteria.e4.ruleKey=csharpsquid:S2139
sonar.issue.ignore.multicriteria.e4.resourceKey=**/UnitOfWork.cs

# Ignore "Use RunAsync instead" in Gateway
sonar.issue.ignore.multicriteria.e5.ruleKey=csharpsquid:S6966
sonar.issue.ignore.multicriteria.e5.resourceKey=**/Gateway/**/*.cs
