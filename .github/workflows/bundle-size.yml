name: Bundle Size Monitor

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/Presentation/Web/**'
  push:
    branches: [main]
    paths:
      - 'src/Presentation/Web/**'

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Presentation/Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Presentation/Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Analyze bundle size
        run: |
          echo "### Bundle Size Analysis 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Chunk | Size (gzip) |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY

          # Analyze dist folder
          for file in dist/assets/*.js; do
            if [ -f "$file" ]; then
              size=$(gzip -c "$file" | wc -c | numfmt --to=iec)
              name=$(basename "$file")
              echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Total Size 📦" >> $GITHUB_STEP_SUMMARY
          total_size=$(gzip -c dist/assets/*.js 2>/dev/null | wc -c | numfmt --to=iec)
          echo "Total JS (gzipped): **$total_size**" >> $GITHUB_STEP_SUMMARY

      - name: Compare with main (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get dist folder size
            const distPath = 'src/Presentation/Web/dist';
            let totalSize = 0;

            function getDirSize(dirPath) {
              let size = 0;
              const files = fs.readdirSync(dirPath);

              for (const file of files) {
                const filePath = path.join(dirPath, file);
                const stats = fs.statSync(filePath);

                if (stats.isDirectory()) {
                  size += getDirSize(filePath);
                } else {
                  size += stats.size;
                }
              }

              return size;
            }

            if (fs.existsSync(distPath)) {
              totalSize = getDirSize(distPath);
              const sizeInMB = (totalSize / 1024 / 1024).toFixed(2);

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📦 Bundle Size Report

                **Total dist folder size:** ${sizeInMB} MB

                <details>
                <summary>View detailed breakdown</summary>

                The bundle has been analyzed and built successfully.

                </details>

                ---
                *This comment was automatically generated by the bundle size monitor.*`
              });
            }

      - name: Check bundle size limits
        run: |
          # Check if any chunk exceeds 500KB
          max_size=512000  # 500KB in bytes
          exceeded=0

          for file in dist/assets/*.js; do
            if [ -f "$file" ]; then
              size=$(gzip -c "$file" | wc -c)
              if [ $size -gt $max_size ]; then
                echo "❌ Warning: $(basename $file) exceeds 500KB (size: $(echo $size | numfmt --to=iec))"
                exceeded=1
              fi
            fi
          done

          if [ $exceeded -eq 1 ]; then
            echo "⚠️ Some chunks exceed the recommended size limit of 500KB"
            exit 0  # Don't fail the build, just warn
          else
            echo "✅ All chunks are within size limits"
          fi
