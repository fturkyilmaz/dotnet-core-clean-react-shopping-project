name: Web Release

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'src/Presentation/Web/**'
      - '.github/workflows/web-release.yml'

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Presentation/Web
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Presentation/Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-release-build
          path: src/Presentation/Web/dist

  chromatic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Presentation/Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Presentation/Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: src/Presentation/Web
          exitOnceUploaded: true
          onlyChanged: true
